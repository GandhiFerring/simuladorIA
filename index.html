<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay - Ferring University</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-900 min-h-screen font-sans text-gray-800">
    <header class="bg-ferring text-white shadow-md">
        <div class="w-[80%] mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-white p-2 rounded block h-12 w-32 flex items-center justify-center text-ferring font-black text-xs border border-gray-200 shadow-inner">
                    <img src="img/ferringUniversity_portada.PNG" alt="Logo ferring" srcset="">
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider">FERRING UNIVERSITY</h1>
                    <p class="text-xs text-blue-100 uppercase tracking-widest">Medical Affairs Training</p>
                </div>
            </div>
            <div class="text-sm font-medium bg-ferring-dark px-4 py-2 rounded-full">
                Simulador de Ventas IA
            </div>
        </div>
    </header>

    <main class="w-[80%] mx-auto mt-10 mb-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 lg:col-span-1 flex flex-col items-center text-center">
            
            <div class="w-32 h-32 bg-ferring-light rounded-full mb-4 flex items-center justify-center border-4 border-ferring">
                <img src="img/doctora1.png" alt="" srcset="">
                <!-- <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-ferring" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg> -->
            </div>
            
            <h2 class="text-2xl font-bold text-gray-800">Dra. Adriana</h2>
            <p class="text-sm text-ferring font-semibold uppercase tracking-wide mb-2">Especialista (CDMX)</p>
            <p class="text-sm text-gray-500 mb-8 px-4">Evaluación de eficacia clínica y costos en tratamientos especializados.</p>

            <button id="btn-hablar" class="bg-green-300 hover:bg-green-500 text-black font-bold py-4 px-8 rounded-full w-full transition-all shadow-md cursor-pointer flex justify-center items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                <span>Presiona y Habla</span>
            </button>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100 lg:col-span-2 flex flex-col">
            <h3 class="text-lg font-bold text-gray-800 border-b pb-3 mb-6">Registro de la Visita Médica</h3>
            
            <div class="flex-1 space-y-6 overflow-y-auto max-h-[500px] pr-2">
                <div class="bg-gray-50 border-l-4 border-emerald-500 p-4 rounded-r-lg">
                    <p class="text-xs text-emerald-600 font-bold uppercase mb-1">Representante (Tú):</p>
                    <p id="texto-usuario" class="text-gray-700 italic">Esperando a que inicies la conversación...</p>
                </div>

                <div class="bg-ferring-light border-l-4 border-ferring p-4 rounded-r-lg">
                    <p class="text-xs text-ferring-dark font-bold uppercase mb-1">Dra. Adriana:</p>
                    <p id="texto-bot" class="text-gray-800 font-medium">...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. CONFIGURACIÓN DE GEMINI ---
        const GEMINI_API_KEY = "AIzaSyD57V425fDhoW2xcRdnGfBNPpuq1W0-FL0"; 
        
        // El System Prompt define la personalidad
        const instruccionesSistema = `Eres la Dra. Adriana, una exigente médica especialista en un hospital de la Ciudad de México. Estás en una visita médica con un representante de ventas de Ferring Pharmaceuticals. 

        Tu actitud: Tienes la agenda llena, eres directa y escéptica. Exiges evidencia clínica sólida antes de recetar cualquier cosa y pides casos de uso o da un cuadro clínico.

        Medicamentos de Ferring que te pueden presentar y tu postura ante ellos:
        - Rekovelle (folitropina delta) o Merapur (menotropina): Sabes que son para fertilidad y reproducción asistida. Tu objeción principal es el alto costo para las pacientes mexicanas y quieres saber si realmente mejora la tasa de nacimientos vivos frente a la competencia.
        - Minirin (desmopresina): Sabes que es para enuresis o diabetes insípida. Tu objeción principal son los efectos secundarios (riesgo de hiponatremia) y la adherencia al tratamiento en niños.
        - Glypressin (terlipresina): Sabes que es para el sangrado de várices esofágicas. Tu objeción principal es el perfil de seguridad cardiovascular y si justifica el precio para los presupuestos del hospital.

        Reglas estrictas para tus respuestas:
        1. Responde SIEMPRE en español de México, usando jerga médica de forma natural.
        2. NUNCA uses viñetas, asteriscos, negritas ni caracteres especiales, ya que tu respuesta será leída por un sistema automático de texto-a-voz. Escribe en texto plano.
        3. Sé extremadamente breve: máximo 1 oraciones por turno. Corta el rollo y ve al grano.`;
        // Historial de la conversación para que no pierda el hilo
        let historialConversacion = [];

        // Elementos del DOM
        const btnHablar = document.getElementById('btn-hablar');
        const txtUsuario = document.getElementById('texto-usuario');
        const txtBot = document.getElementById('texto-bot');

        // --- 2. CONFIGURACIÓN DE AUDIO NATIVO ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const reconocimiento = new SpeechRecognition();
        reconocimiento.lang = 'es-MX';
        reconocimiento.interimResults = false;

        const hablar = (texto) => {
            const utterance = new SpeechSynthesisUtterance(texto);
            utterance.lang = 'es-MX';
            utterance.rate = 1.1;
            utterance.pitch = 1.1; 
            window.speechSynthesis.speak(utterance);
        };

        // --- 3. LÓGICA DE INTERACCIÓN ---
        btnHablar.addEventListener('click', () => {
            reconocimiento.start();
            btnHablar.innerText = "Escuchando...";
            btnHablar.classList.replace('bg-indigo-600', 'bg-rose-600');
        });

        reconocimiento.onresult = async (event) => {
            const textoEscuchado = event.results[0][0].transcript;
            txtUsuario.innerText = textoEscuchado;
            
            btnHablar.innerText = "Pensando...";
            btnHablar.classList.replace('bg-rose-600', 'bg-amber-500');

            // Añadimos lo que dijo el usuario al historial (formato Gemini)
            historialConversacion.push({
                role: "user",
                parts: [{ text: textoEscuchado }]
            });

            try {
                // 1. Actualizamos el modelo a la versión vigente (gemini-2.5-flash)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

                const respuesta = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: instruccionesSistema }]
                        },
                        contents: historialConversacion,
                        generationConfig: {
                            temperature: 0.7 
                        }
                    })
                });

                const data = await respuesta.json();

                // 2. Validamos si Google nos regresó un error antes de intentar leer los datos
                if (!respuesta.ok) {
                    throw new Error(data.error?.message || "Error en el servidor de Google");
                }

                // Extraer el texto de la respuesta de Gemini
                const textoBot = data.candidates[0].content.parts[0].text;

                // Añadimos la respuesta de la doctora al historial (rol "model")
                historialConversacion.push({
                    role: "model",
                    parts: [{ text: textoBot }]
                });

                // Mostrar en pantalla y hablar
                txtBot.innerText = textoBot;
                hablar(textoBot);

            } catch (error) {
                console.error("Error en Gemini API:", error);
                txtBot.innerText = "Hubo un error de conexión con la Dra. Adriana.";
            }

            // Restaurar botón
            btnHablar.innerText = "Presiona y Habla";
            btnHablar.classList.replace('bg-amber-500', 'bg-indigo-600');
        };

        reconocimiento.onerror = (event) => {
            console.error("Error de micrófono:", event.error);
            btnHablar.innerText = "No te escuché - Intenta de nuevo";
            btnHablar.classList.replace('bg-rose-600', 'bg-indigo-600');
        };
    </script>
</body>
</html>
