<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleplay - Ferring University</title>
    <link href="./src/css/app.css" rel="stylesheet">
</head>
<body class="min-h-screen font-sans text-gray-800">
    <!-- Header -->
    <header class="bg-[#0068a6] text-white shadow-md">
        <div class="w-[80%] mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="p-2 rounded block h-12 w-32 flex items-center justify-center text-ferring font-black text-xs">
                    <img src="img/UF_blanco.png" alt="Logo ferring" srcset="">
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-wider">FERRING UNIVERSITY</h1>
                    <p class="text-xs text-blue-100 uppercase tracking-widest">Medical Affairs Training</p>
                </div>
            </div>
            <div class="text-sm font-medium bg-ferring-dark px-4 py-2 rounded-full">
                Simulador de Ventas IA 
            </div>
        </div>
    </header>

    <main>
        <div class="w-[80%] mx-auto py-4 grid grid-cols-1 md:grid-cols-3 gap-4" >
            <div class="max-w-sm bg-white border border-gray-200 rounded-lg shadow-md overflow-hidden">
                <img class="w-full h-48 object-cover" src="img/productos/cajaMerapur.webp" alt="Producto" />
                <!-- Contenido -->
                <div class="p-5">
                    <span class="text-xs font-bold uppercase tracking-wide text-indigo-600">Facultad Merapur</span>
                    <h5 class="mt-2 mb-2 text-xl font-bold tracking-tight text-gray-900">Mes 1 - Merapur</h5>
                    <p class="mb-4 text-sm text-gray-600 leading-relaxed">
                        Aquí irá alguna descripción
                    </p>
                    
                    <!-- Botón -->
                    <a href="./simulador.html" class="inline-flex items-center px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-md hover:bg-indigo-700 transition-colors duration-200">
                    Iniciar Videollamada
                    </a>
                </div>
            </div>
    </main>
    <script src="src/js/app.js"></script>
</body>
</html>
